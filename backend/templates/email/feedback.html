<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Новое сообщение</title>
</head>
<body style="margin:0;padding:24px;background-color:#f3f4f6;font-family:Arial,Helvetica,sans-serif;">

<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background:#f3f4f6;">
    <tr>
        <td align="center">

            <table role="presentation"
                   cellpadding="0"
                   cellspacing="0"
                   border="0"
                   width="600"
                   style="width:600px;background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;">
                <tr>
                    <td style="padding:30px;">

                        <h1 style="margin:0;font-size:28px;color:#111827;font-weight:bold;">
                            Новое сообщение из формы обратной связи
                        </h1>

                        <p style="margin:8px 0 28px;color:#6b7280;font-size:14px;">
                            Форма контактов портфолио
                        </p>

                        <table role="presentation"
                               cellpadding="12"
                               cellspacing="0"
                               border="0"
                               width="100%"
                               style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;">

                            <tr>

                                <td width="50%" valign="top">

                                    <div style="font-size:12px;font-weight:bold;color:#9ca3af;text-transform:uppercase;margin-bottom:6px;">
                                        Имя отправителя
                                    </div>

                                    <div style="font-size:16px;color:#111827;">
                                        {{ name }}
                                    </div>

                                </td>

                                <td width="50%" valign="top">

                                    <div style="font-size:12px;font-weight:bold;color:#9ca3af;text-transform:uppercase;margin-bottom:6px;">
                                        Email отправителя
                                    </div>

                                    <a href="mailto:{{ user_email }}"
                                       style="font-size:16px;color:#15803d;text-decoration:none;">
                                        {{ user_email }}
                                    </a>

                                </td>

                            </tr>

                        </table>

                        <table role="presentation"
                               cellpadding="0"
                               cellspacing="0"
                               border="0"
                               width="100%"
                               style="margin-top:24px;">

                            <tr>

                                <td style="background:#f0fdf4;border-left:5px solid #16a34a;padding:20px;">

                                    <div style="font-size:15px;font-weight:bold;color:#166534;margin-bottom:10px;">
                                        Текст сообщения
                                    </div>

                                    <div style="font-size:15px;color:#166534;line-height:1.7;">
                                        {{ message|linebreaksbr }}
                                    </div>

                                </td>

                            </tr>

                        </table>

                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
